<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Account settings">
    <meta name="theme-color" content="#4CAF50">
    <title>Settings - Blog Platform</title>
    <link rel="stylesheet" href="user.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="user-nav">
        <div class="nav-brand">
            <i class="fas fa-cog"></i>
            <span>Settings</span>
        </div>
        <div class="nav-links">
            <a href="user.html" class="nav-link">
                <i class="fas fa-book-reader"></i> Posts
            </a>
            <a href="search.html" class="nav-link">
                <i class="fas fa-search"></i> Search
            </a>
            <a href="notifications.html" class="nav-link">
                <i class="fas fa-bell"></i> Notifications
            </a>
            <a href="../userlog.html" class="nav-link" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </nav>

    <div class="blog-container">
        <div class="posts-grid" style="grid-template-columns: 1fr; max-width: 900px; margin: 0 auto;">
            <div class="post" style="cursor: default;">
                <h2><i class="fas fa-user"></i> Profile</h2>
                <form id="profileForm" class="comment-form" style="flex-direction: column; gap: 12px;">
                    <input class="comment-input" id="username" placeholder="Username (public)" autocomplete="off">
                    <input class="comment-input" id="displayName" placeholder="Display name" autocomplete="off">
                    <input class="comment-input" id="avatarUrl" placeholder="Avatar URL (optional)" autocomplete="off">
                    <textarea id="bio" placeholder="Bio" style="min-height: 90px; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.08);"></textarea>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <input class="comment-input" id="twitter" placeholder="Twitter/X URL">
                        <input class="comment-input" id="github" placeholder="GitHub URL">
                        <input class="comment-input" id="linkedin" placeholder="LinkedIn URL">
                        <input class="comment-input" id="website" placeholder="Website URL">
                    </div>

                    <button class="btn btn-primary" type="submit">
                        <i class="fas fa-save"></i> Save profile
                    </button>
                </form>
            </div>

            <div class="post" style="cursor: default;">
                <h2><i class="fas fa-lock"></i> Change password</h2>
                <form id="passwordForm" class="comment-form" style="flex-direction: column; gap: 12px;">
                    <input class="comment-input" id="oldPassword" type="password" placeholder="Old password" autocomplete="current-password">
                    <input class="comment-input" id="newPassword" type="password" placeholder="New password" autocomplete="new-password">
                    <button class="btn btn-primary" type="submit">
                        <i class="fas fa-key"></i> Update password
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script>window.CONFIG = { API_BASE_URL: window.location.origin };</script>
    <script src="settings.js"></script>
</body>
</html>
